<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EARNING WITH KIPU BHAIYA 💸</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }

    body{
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background:#050b16;
      overflow:hidden;
      color:white;
    }

    /* Background Glow */
    body::before{
      content:'';
      position:absolute;
      width:500px;
      height:500px;
      background:radial-gradient(circle,#0d2248 0%, transparent 70%);
      filter:blur(80px);
      z-index:0;
    }

    .container{
      position:relative;
      z-index:2;
      text-align:center;
      padding:20px;
      width:100%;
      max-width:400px;
    }

    .title{
      font-size:52px;
      font-weight:900;
      line-height:1.1;
      color:#ffc83d;
      text-shadow:0 0 15px rgba(255,200,61,0.5);
      margin-bottom:40px;
      animation:fadeIn 1s ease;
    }

    .telegram-btn{
      display:inline-block;
      padding:20px 60px;
      border-radius:50px;
      text-decoration:none;
      font-size:28px;
      font-weight:800;
      color:#000;
      background:linear-gradient(90deg,#ffd54f,#9fdcff);
      box-shadow:0 0 25px rgba(255,215,0,0.5);
      transition:0.3s;
      animation:pulse 2s infinite;
    }

    .telegram-btn:hover{
      transform:scale(1.05);
      box-shadow:0 0 35px rgba(255,215,0,0.8);
    }

    .footer{
      margin-top:40px;
      font-size:18px;
      color:#8a8a8a;
    }

    @keyframes pulse{
      0%{
        transform:scale(1);
      }
      50%{
        transform:scale(1.03);
      }
      100%{
        transform:scale(1);
      }
    }

    @keyframes fadeIn{
      from{
        opacity:0;
        transform:translateY(20px);
      }
      to{
        opacity:1;
        transform:translateY(0);
      }
    }

    /* Mobile Responsive */
    @media(max-width:480px){
      .title{
        font-size:42px;
      }

      .telegram-btn{
        width:100%;
        font-size:24px;
        padding:18px 20px;
      }

      .footer{
        font-size:14px;
      }
    }
  </style>
</head>
<body>

  <div class="container">
    <h1 class="title">EARNING WITH<br>KIPU BHAIYA 💸</h1>

    <!-- Telegram Link -->
    <a href="https://t.me/+27gARwy3CsQ5Yjg1" class="telegram-btn">
      JOIN TELEGRAM
    </a>

    <div class="footer">
      © 2026 @kipuyadav TG. All rights reserved.
    </div>
  </div>

</body>
</html>
